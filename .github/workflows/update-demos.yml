name: Update Demo Data

on:
  schedule:
    # Cada 2 h en horario de operación portuaria: 06:00–22:00 España (verano, UTC+2).
    # Más frescura para los datos AIS en vivo sin saturar VesselFinder.
    - cron: '0 4-20/2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-alicante:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Actualizar datos Alicante
        run: node scripts/update-alicante.mjs

      - name: Detectar cambios
        id: check
        run: |
          git diff --quiet src/pages/demos/alicante/data.json \
            && echo "changed=false" >> $GITHUB_OUTPUT \
            || echo "changed=true"  >> $GITHUB_OUTPUT

      - name: Subir data.json
        if: steps.check.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: alicante-data
          path: src/pages/demos/alicante/data.json

  update-huelva:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependencias
        run: npm ci --ignore-scripts

      - name: Actualizar datos Huelva
        run: node scripts/update-huelva.mjs

      - name: Detectar cambios
        id: check
        run: |
          git diff --quiet src/pages/demos/huelva/data.json \
            && echo "changed=false" >> $GITHUB_OUTPUT \
            || echo "changed=true"  >> $GITHUB_OUTPUT

      - name: Subir data.json
        if: steps.check.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: huelva-data
          path: src/pages/demos/huelva/data.json

  update-marin:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Actualizar datos Marín
        run: node scripts/update-marin.mjs

      # Enriquece con datos de buque (IMO/GT/eslora/bandera) desde vesselfinder.com.
      # No fatal SOLO en el cron (si las IPs de Actions están limitadas, la caché
      # commiteada mantiene lo ya resuelto). En ejecuciones manuales (workflow_dispatch)
      # sí falla, para detectar regresiones de parsing/escritura cuanto antes.
      - name: Enriquecer datos de buque Marín
        continue-on-error: ${{ github.event_name == 'schedule' }}
        run: node scripts/enrich-marin.mjs

      # Datos AIS en vivo (estado de navegación, velocidad, calado, ETA reportada).
      # Best-effort y SIEMPRE no fatal: es enriquecimiento dinámico opcional, así que
      # un fallo (rate-limit/layout) no debe tumbar el job ni descartar los resultados
      # ya válidos de update-marin/enrich-marin (también en workflow_dispatch). Si falla,
      # buildCalls conserva el último AIS conocido del data.json previo.
      - name: Enriquecer datos AIS en vivo Marín
        continue-on-error: true
        run: node scripts/enrich-marin-live.mjs

      - name: Detectar cambios
        id: check
        run: |
          git diff --quiet src/pages/demos/marin/data.json src/pages/demos/marin/vessel-cache.json \
            && echo "changed=false" >> $GITHUB_OUTPUT \
            || echo "changed=true"  >> $GITHUB_OUTPUT

      - name: Subir data.json + cache
        if: steps.check.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: marin-data
          path: |
            src/pages/demos/marin/data.json
            src/pages/demos/marin/vessel-cache.json

  commit:
    needs: [update-alicante, update-huelva, update-marin]
    # always() para que corra aunque un job falle; solo commitea los que tuvieron cambios
    if: always() && (needs.update-alicante.outputs.changed == 'true' || needs.update-huelva.outputs.changed == 'true' || needs.update-marin.outputs.changed == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Descargar data.json Alicante
        if: needs.update-alicante.outputs.changed == 'true'
        uses: actions/download-artifact@v4
        with:
          name: alicante-data
          path: src/pages/demos/alicante

      - name: Descargar data.json Huelva
        if: needs.update-huelva.outputs.changed == 'true'
        uses: actions/download-artifact@v4
        with:
          name: huelva-data
          path: src/pages/demos/huelva

      - name: Descargar data.json Marín
        if: needs.update-marin.outputs.changed == 'true'
        uses: actions/download-artifact@v4
        with:
          name: marin-data
          path: src/pages/demos/marin

      - name: Commitear y pushear
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/pages/demos/alicante/data.json src/pages/demos/huelva/data.json src/pages/demos/marin/data.json src/pages/demos/marin/vessel-cache.json
          git diff --staged --quiet && echo "Sin cambios finales" && exit 0
          git commit -m "chore: actualizar datos demos $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
