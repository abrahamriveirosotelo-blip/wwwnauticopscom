name: Update Alicante Demo Data

on:
  schedule:
    - cron: '0 */2 * * *'   # cada 2 horas
  workflow_dispatch:          # disparo manual desde GitHub Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Actualizar datos de la demo
        run: node scripts/update-alicante.mjs

      - name: Commitear si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/pages/demos/alicante/data.json
          git diff --staged --quiet && echo "Sin cambios" && exit 0
          git commit -m "chore: actualizar datos demo Alicante $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
