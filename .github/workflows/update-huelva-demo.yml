name: Update Huelva Demo Data

on:
  schedule:
    - cron: '0 6 * * *'    # 08:00 España (verano, UTC+2)
    - cron: '0 10 * * *'   # 12:00 España (verano, UTC+2)
  workflow_dispatch:          # disparo manual desde GitHub Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependencias
        run: npm ci --ignore-scripts

      - name: Actualizar datos de la demo
        run: node scripts/update-huelva.mjs

      - name: Commitear si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/pages/demos/huelva/data.json
          git diff --staged --quiet && echo "Sin cambios" && exit 0
          git commit -m "chore: actualizar datos demo Huelva $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
